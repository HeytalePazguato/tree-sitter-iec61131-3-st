name: release

# Stable release flow. Triggered when commits land on main (typically from a
# release/* PR that bumped the VERSION file). Reads VERSION as the source of
# truth, tags v<VERSION>, creates a GitHub release with the generated
# parser.c attached, then publishes to npm / crates.io / PyPI.
#
# Idempotent: if the tag already exists (i.e. main was pushed without a
# VERSION bump), the workflow exits cleanly without retagging or republishing.
#
# Publishing is GATED on the corresponding registry secret being set:
#   NPM_TOKEN              → enables `npm publish`
#   CARGO_REGISTRY_TOKEN   → enables `cargo publish`
#   PYPI_API_TOKEN         → enables `twine upload`
# Steps that lack their secret are skipped, so a partial registry rollout
# (e.g. only npm at first) is supported without errors.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Read VERSION
        id: ver
        run: |
          set -euo pipefail
          v=$(tr -d '[:space:]' < VERSION)
          if [ -z "$v" ]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"    >> "$GITHUB_OUTPUT"

      - name: Idempotence guard
        id: guard
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists; skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify generated parser is up to date
        if: steps.guard.outputs.exists == 'false'
        run: |
          tree-sitter generate
          if [[ -n "$(git status --porcelain src/)" ]]; then
            echo "::error::src/ is out of date in main branch."
            exit 1
          fi

      - name: Push tag
        if: steps.guard.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub release
        if: steps.guard.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: tree-sitter-iec61131-3 ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            src/parser.c

      # ─── npm ────────────────────────────────────────────────────────────
      - name: Publish to npm
        if: steps.guard.outputs.exists == 'false' && env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install --ignore-scripts
          npm publish --access public --provenance

      # ─── crates.io ──────────────────────────────────────────────────────
      - name: Publish to crates.io
        if: steps.guard.outputs.exists == 'false' && env.CARGO_REGISTRY_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

      # ─── PyPI ───────────────────────────────────────────────────────────
      - name: Publish to PyPI
        if: steps.guard.outputs.exists == 'false' && env.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_API_TOKEN:  ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine upload --non-interactive dist/*
