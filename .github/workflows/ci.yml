name: ci

# Gate workflow: lint + build + test. Must pass before any package or
# release job is allowed to run. Triggered on every relevant branch push and
# on PRs targeting main or develop.
on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # TODO: add a language-version dimension if your toolchain has one,
        # e.g.  go: ["1.22.x", "1.23.x"]   node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

