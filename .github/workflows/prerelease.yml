name: prerelease

# Two distinct flows live here:
#
#   develop    -> dev-build job: build snapshot artifacts, upload as workflow
#                 artifact stamped 0.0.<run_number>-dev (90d retention),
#                 trim to keep only the latest 3 dev artifacts.
#
#   release/*  -> prerelease job: derive base version from branch name,
#                 pick stage from commit-message keyword (default alpha,
#                 [beta], [rc]), auto-increment the per-stage counter,
#                 push the new tag, and let the release tool publish a
#                 GitHub pre-release.
on:
  push:
    branches: [develop, "release/**"]

permissions:
  contents: write
  # actions: write is required so the dev-build job can list and delete old
  # workflow artifacts via the GitHub API. Declaring any permissions block
  # silently scopes every unlisted permission to `none`.
  actions: write
  # packages: write    # uncomment if pushing container images

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-build:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TODO: set up your language toolchain (same as ci.yml).

      - name: Compute dev version
        id: ver
        run: |
          v="0.0.${{ github.run_number }}-dev"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"     >> "$GITHUB_OUTPUT"

      # TODO: build snapshot artifacts. Examples:
      #
      # Go:
      # - uses: goreleaser/goreleaser-action@v6
      #   with: { version: "~> v2", args: release --snapshot --clean --skip=publish }
      #   env: { GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.tag }} }
      #
      # Node:
      # - run: npm ci && npm run build
      #
      # Python:
      # - run: pipx run build

      - name: Upload dev artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ steps.ver.outputs.version }}
          path: |
            dist/**
          retention-days: 90

      - name: Trim old dev artifacts (keep latest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | contains("-dev")) | "\(.created_at)\t\(.id)"' \
            | sort -r \
            | awk -F'\t' 'NR>3 {print $2}' \
            | xargs -r -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/{}"

  prerelease:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # TODO: set up your language toolchain.

      - name: Compute prerelease tag
        id: tag
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          base="${REF#refs/heads/release/}"
          msg=$(git log -1 --pretty=%B)
          if echo "$msg" | grep -qE '\[rc\]'; then
            stage=rc
          elif echo "$msg" | grep -qE '\[beta\]'; then
            stage=beta
          else
            stage=alpha
          fi
          git fetch --tags --quiet
          existing=$(git tag --list "v${base}-${stage}.*" | wc -l | tr -d ' ')
          next=$((existing + 1))
          tag="v${base}-${stage}.${next}"
          echo "base=$base"   >> "$GITHUB_OUTPUT"
          echo "stage=$stage" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "Selected $tag"

      - name: Idempotence guard
        id: guard
        run: |
          if git rev-parse "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.guard.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      # TODO: run your release tool. It should detect the tag and publish a
      # GitHub pre-release. Examples:
      #
      # Go:
      # - uses: goreleaser/goreleaser-action@v6
      #   with: { version: "~> v2", args: release --clean }
      #   env:
      #     GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
      #     HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      #     SCOOP_GITHUB_TOKEN:        ${{ secrets.SCOOP_GITHUB_TOKEN }}
      #
      # Node:
      # - run: npm ci && npm publish --tag next
      #   env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }

      - name: Trim old prereleases (keep latest 5)
        if: steps.guard.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease)] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                gh release delete "$tag" --yes --cleanup-tag
              done
